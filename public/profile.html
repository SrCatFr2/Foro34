<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil · Foro34</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="profile-page">
    <header class="profile-topbar glass">
      <a href="/" class="link-btn">Volver al foro</a>
      <div id="profileTopActions"></div>
    </header>

    <main class="profile-main">
      <section id="profileCard" class="profile-card glass">
        <div class="profile-cover" id="profileCover"></div>

        <div class="profile-header">
          <div class="profile-avatar-wrap">
            <div id="profileAvatar" class="profile-avatar"></div>
            <label id="profileAvatarUploadLabel" class="avatar-upload hidden">
              Cambiar foto
              <input id="profileAvatarInput" type="file" accept="image/*" hidden />
            </label>
          </div>

          <div class="profile-meta">
            <h1 id="profileUsername">Cargando...</h1>
            <p id="profileEmail"></p>
            <p id="profileBio"></p>

            <div class="profile-extra">
              <span id="profileLocation"></span>
              <span id="profileWebsite"></span>
              <span id="profileJoinDate"></span>
            </div>
          </div>
        </div>

        <div class="profile-stats" id="profileStats"></div>

        <div class="profile-actions" id="profileActions"></div>
      </section>

      <section class="profile-messages glass">
        <div class="section-head">
          <h2>Mensajes recientes</h2>
        </div>
        <div id="userMessagesContainer" class="profile-message-list"></div>
      </section>
    </main>
  </div>

  <div id="editProfileModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card glass">
      <button class="modal-close" id="closeEditProfileBtn">×</button>

      <div class="edit-form">
        <h2>Editar perfil</h2>

        <label>
          Bio
          <textarea id="editBio" rows="5" maxlength="500"></textarea>
        </label>

        <label>
          Ubicación
          <input id="editLocation" type="text" maxlength="100" />
        </label>

        <label>
          Sitio web
          <input id="editWebsite" type="url" />
        </label>

        <div class="edit-actions">
          <button id="saveProfileBtn" class="primary-btn">Guardar cambios</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="/js/profile.js"></script>
</body>
</html>
