<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Foro34</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .profile-wrapper {
      background: var(--bg-primary);
      min-height: 100vh;
      padding: 20px;
    }

    .profile-card {
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .profile-banner {
      height: 200px;
      background: var(--gradient-1);
      position: relative;
    }

    .profile-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--bg-secondary);
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gradient-1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      font-weight: 700;
      overflow: hidden;
    }

    .profile-avatar-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile-content {
      padding: 80px 24px 24px;
      text-align: center;
    }

    .profile-name {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-email {
      color: var(--text-tertiary);
      font-size: 13px;
      margin-bottom: 16px;
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 20px 0;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      margin: 20px 0;
    }

    .profile-stat {
      text-align: center;
    }

    .profile-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-primary);
    }

    .profile-stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .profile-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .profile-bio {
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 20px 0;
      font-size: 14px;
    }

    .profile-messages {
      margin-top: 24px;
      text-align: left;
    }

    .profile-messages h3 {
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .message-item {
      padding: 12px;
      background: var(--bg-tertiary);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .profile-wrapper {
        padding: 12px;
      }

      .profile-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="dark-mode">
  <div class="profile-wrapper">
    <div class="profile-card" id="profileContainer">
      <div class="profile-banner"></div>
      <div class="profile-content">
        <div class="profile-avatar-large"><i class="fas fa-user"></i></div>
        <div class="profile-name" id="profileName">Cargando...</div>
        <div class="profile-email" id="profileEmail"></div>
        <div class="profile-bio" id="profileBio"></div>
        <div class="profile-stats" id="profileStats"></div>
        <div class="profile-actions" id="profileActions"></div>
        <div class="profile-messages" id="profileMessages"></div>
      </div>
    </div>
  </div>

  <script src="/js/profile.js"></script>
</body>
</html>
