<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foro34 - Community Forum</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="dark-mode">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-comments"></i>
          </div>
          <span class="logo-text">Foro34</span>
        </div>

        <nav class="nav-menu">
          <button class="nav-item active" data-filter="recent">
            <i class="fas fa-home"></i>
            <span>Para ti</span>
          </button>
          <button class="nav-item" data-filter="trending">
            <i class="fas fa-fire"></i>
            <span>Trending</span>
          </button>
          <button class="nav-item" data-filter="myMessages">
            <i class="fas fa-comment-dots"></i>
            <span>Mis Posts</span>
          </button>
        </nav>
      </div>

      <div class="sidebar-bottom" id="authSection"></div>
    </aside>

    <!-- Main Content -->
    <main class="main-container">
      <!-- Top Bar -->
      <header class="header-bar">
        <div class="search-container">
          <i class="fas fa-search search-icon"></i>
          <input type="text" placeholder="Buscar..." id="searchInput" class="search-input">
        </div>
        <div class="header-actions">
          <button class="notification-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-badge">0</span>
          </button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content-area">
        <!-- Create Post Section -->
        <section class="create-post-card">
          <div class="post-header">
            <div class="user-avatar-small" id="myAvatarSmall">
              <i class="fas fa-user"></i>
            </div>
            <div class="post-input-wrapper">
              <textarea id="messageContent" placeholder="¿Qué está pasando?!" class="post-textarea"></textarea>
              <input type="text" id="authorName" placeholder="Tu nombre" class="post-author" hidden>
            </div>
          </div>

          <div class="post-media-section">
            <label class="media-btn-icon">
              <i class="fas fa-image"></i>
              <input type="file" id="imageInput" accept="image/*" multiple hidden>
            </label>
            <label class="media-btn-icon">
              <i class="fas fa-video"></i>
              <input type="file" id="videoInput" accept="video/*" hidden>
            </label>
          </div>

          <div id="mediaPreview" class="media-preview-grid"></div>

          <button id="sendBtn" class="btn-post">
            <i class="fas fa-paper-plane"></i> Publicar
          </button>
        </section>

        <!-- Messages Feed -->
        <div id="loading" class="loading-skeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>

        <div id="messagesContainer" class="feed-container"></div>
      </div>
    </main>
  </div>

  <!-- Auth Modal -->
  <div id="authModal" class="modal-overlay hidden">
    <div class="modal-window">
      <button class="modal-close" onclick="closeAuthModal()">
        <i class="fas fa-times"></i>
      </button>
      <div id="authForm" class="auth-form"></div>
    </div>
  </div>

  <script src="/js/client.js"></script>
</body>
</html>
